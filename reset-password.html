<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha – UaiGames</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="img/icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: url('paginadelogin/img/pg_login.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(15,32,39,0.55), rgba(44,83,100,0.55));
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(0,255,255,0.2);
      border-radius: 20px;
      padding: 50px 40px 40px;
      box-shadow: 0 8px 32px rgba(0,255,255,0.10), 0 0 50px rgba(0,0,0,0.3);
      animation: slideIn 0.45s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 32px; }

    .header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.6rem;
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc00, 2px 2px 4px #000;
      margin-bottom: 10px;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { text-shadow: 0 0 10px #ffcc00, 2px 2px 4px #000; }
      50%      { text-shadow: 0 0 22px #ffcc00, 2px 2px 4px #000; }
    }

    .header p { color: #00ffff; font-size: 0.88rem; text-shadow: 0 0 5px #00ffff; }

    .icon-lock {
      width: 60px; height: 60px;
      margin: 0 auto 18px;
      background: rgba(0,255,255,0.12);
      border: 2px solid rgba(0,255,255,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: #00ffff;
    }

    label {
      display: block;
      color: #fff;
      font-weight: bold;
      font-size: 0.93rem;
      margin-bottom: 6px;
    }

    .input-group { margin-bottom: 20px; }

    .input-field { position: relative; }

    .input-field i.icon-left {
      position: absolute; top: 50%; left: 12px;
      transform: translateY(-50%);
      color: #777; pointer-events: none;
    }

    .input-field i.toggle-password {
      position: absolute; top: 50%; right: 12px;
      transform: translateY(-50%);
      color: #999; cursor: pointer;
      transition: color 0.2s;
    }

    .input-field i.toggle-password:hover { color: #ccc; }
    .input-field i.toggle-password.visible { color: #f7b500; }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 40px 12px 38px;
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="password"]::placeholder,
    input[type="text"]::placeholder { color: #aaa; }

    input[type="password"]:focus,
    input[type="text"]:focus {
      background: rgba(0,255,255,0.10);
      border-color: rgba(0,255,255,0.6);
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
    }

    .erro {
      display: none;
      color: #ff5555;
      font-size: 12px;
      margin-top: 5px;
    }

    .requisitos {
      margin: -8px 0 16px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0,255,255,0.07);
      border: 1px solid rgba(0,255,255,0.15);
      font-size: 12px;
      color: #aaa;
      line-height: 1.7;
    }

    .requisitos span { display: block; transition: color 0.3s; }
    .requisitos span.ok { color: #00ff88; }
    .requisitos span.ok::before { content: "✓ "; }
    .requisitos span:not(.ok)::before { content: "○ "; }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #f7b500, #ffcc00);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
      box-shadow: 0 4px 15px rgba(255,204,0,0.3);
    }

    button:hover:not(:disabled) {
      background: linear-gradient(135deg, #ffcc00, #ffd700);
      box-shadow: 0 6px 20px rgba(255,204,0,0.5);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #msg {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
    }

    #msg.sucesso {
      background: rgba(0,255,100,0.12);
      border: 1px solid rgba(0,255,100,0.3);
      color: #00ff88;
    }

    #msg.erro-msg {
      background: rgba(255,60,60,0.12);
      border: 1px solid rgba(255,60,60,0.3);
      color: #ff5555;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,255,255,0.15);
    }

    .footer a {
      color: #00ffff;
      text-decoration: none;
      font-size: 0.88rem;
      transition: all 0.3s;
    }

    .footer a:hover { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }

    /* Estado de erro quando token inválido */
    .estado-invalido {
      text-align: center; padding: 10px 0 20px;
    }
    .estado-invalido .icone-erro {
      font-size: 3rem; color: #ff5555; margin-bottom: 14px;
    }
    .estado-invalido h3 { color: #fff; margin-bottom: 8px; }
    .estado-invalido p { color: #aaa; font-size: 0.88rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="header">
        <h1>UaiGames</h1>
        <div class="icon-lock"><i class="fas fa-lock"></i></div>
        <p>Redefinir senha</p>
      </div>

      <!-- Formulário principal -->
      <div id="formArea">
        <div class="input-group">
          <label for="novaSenha">Nova senha:</label>
          <div class="input-field">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="novaSenha" placeholder="Digite a nova senha" oninput="verificarRequisitos()">
            <i class="fas fa-eye toggle-password" id="toggle1"></i>
          </div>
          <div id="erroSenha" class="erro">A senha não atende aos requisitos mínimos.</div>
        </div>

        <div class="requisitos" id="requisitos">
          <span id="req-min">Mínimo 6 caracteres</span>
          <span id="req-letra">Pelo menos uma letra</span>
          <span id="req-num">Pelo menos um número</span>
        </div>

        <div class="input-group">
          <label for="confirmarSenha">Confirmar nova senha:</label>
          <div class="input-field">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="confirmarSenha" placeholder="Repita a nova senha" oninput="verificarConfirmacao()">
            <i class="fas fa-eye toggle-password" id="toggle2"></i>
          </div>
          <div id="erroConfirmar" class="erro">As senhas não coincidem.</div>
        </div>

        <button id="btnAtualizar" onclick="trocarSenha()" disabled>
          <i class="fas fa-check-circle"></i> Atualizar senha
        </button>

        <div id="msg"></div>
      </div>

      <!-- Estado de token inválido -->
      <div id="tokenInvalido" class="estado-invalido" style="display:none;">
        <div class="icone-erro"><i class="fas fa-times-circle"></i></div>
        <h3>Link inválido ou expirado</h3>
        <p>Este link de redefinição de senha não é mais válido.<br>Solicite um novo link na página de login.</p>
        <div id="msg"></div>
      </div>

      <div class="footer">
        <a href="paginadelogin/PaginaLogin/login.html">← Voltar ao login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://pghogrpvloukvjxqyflm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnaG9ncnB2bG91a3ZqeHF5ZmxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODA0NTMsImV4cCI6MjA5MTc1NjQ1M30.rvYTFT0UrSPGKM1-Zo_fCb6OXMOZC6l-foh6dl-kh-g";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Toggle mostrar/ocultar senha
    document.getElementById('toggle1').addEventListener('click', function () {
      const input = document.getElementById('novaSenha');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.classList.toggle('visible');
    });

    document.getElementById('toggle2').addEventListener('click', function () {
      const input = document.getElementById('confirmarSenha');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.classList.toggle('visible');
    });

    // Verificação dos requisitos em tempo real
    function verificarRequisitos() {
      const senha = document.getElementById('novaSenha').value;
      const min = senha.length >= 6;
      const letra = /[a-zA-Z]/.test(senha);
      const num = /[0-9]/.test(senha);

      setReq('req-min', min);
      setReq('req-letra', letra);
      setReq('req-num', num);

      document.getElementById('erroSenha').style.display = 'none';
      verificarBotao();
    }

    function setReq(id, ok) {
      const el = document.getElementById(id);
      if (ok) el.classList.add('ok');
      else el.classList.remove('ok');
    }

    function verificarConfirmacao() {
      const s1 = document.getElementById('novaSenha').value;
      const s2 = document.getElementById('confirmarSenha').value;
      const erroConf = document.getElementById('erroConfirmar');
      if (s2 && s1 !== s2) {
        erroConf.style.display = 'block';
      } else {
        erroConf.style.display = 'none';
      }
      verificarBotao();
    }

    function senhaValida(s) {
      return s.length >= 6 && /[a-zA-Z]/.test(s) && /[0-9]/.test(s);
    }

    function verificarBotao() {
      const s1 = document.getElementById('novaSenha').value;
      const s2 = document.getElementById('confirmarSenha').value;
      document.getElementById('btnAtualizar').disabled = !(senhaValida(s1) && s1 === s2);
    }

    // Captura token do link de email (hash fragment)
    window.onload = async () => {
      const hash = window.location.hash;
      if (hash) {
        const params = new URLSearchParams(hash.substring(1));
        const access_token = params.get("access_token");
        const refresh_token = params.get("refresh_token");
        const type = params.get("type");

        if (access_token && refresh_token && type === "recovery") {
          const { error } = await sb.auth.setSession({ access_token, refresh_token });
          if (error) {
            mostrarTokenInvalido();
          }
          // formulário já visível por padrão
        } else {
          mostrarTokenInvalido();
        }
      } else {
        mostrarTokenInvalido();
      }
    };

    function mostrarTokenInvalido() {
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('tokenInvalido').style.display = 'block';
    }

    async function trocarSenha() {
      const senha = document.getElementById('novaSenha').value;
      const confirmar = document.getElementById('confirmarSenha').value;
      const btn = document.getElementById('btnAtualizar');
      const msg = document.getElementById('msg');

      msg.style.display = 'none';
      msg.className = '';

      if (!senhaValida(senha)) {
        document.getElementById('erroSenha').style.display = 'block';
        return;
      }

      if (senha !== confirmar) {
        document.getElementById('erroConfirmar').style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Atualizando...';

      const { error } = await sb.auth.updateUser({ password: senha });

      btn.innerHTML = '<i class="fas fa-check-circle"></i> Atualizar senha';
      btn.disabled = false;

      if (error) {
        msg.innerText = "✗ Erro ao trocar senha: " + error.message;
        msg.className = 'erro-msg';
        msg.style.display = 'block';
      } else {
        msg.innerText = "✓ Senha atualizada com sucesso! Redirecionando para o login...";
        msg.className = 'sucesso';
        msg.style.display = 'block';
        document.getElementById('btnAtualizar').disabled = true;
        setTimeout(() => {
          window.location.href = "/paginadelogin/PaginaLogin/login.html";
        }, 2500);
      }
    }
  </script>
</body>
</html>
