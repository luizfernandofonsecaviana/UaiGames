<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login UaiGames</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/stylelogin.css">
    <link rel="icon" href="../../img/icon.png">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>UaiGames</h1>
                <p>Faça login para continuar</p>
            </div>
            <form onsubmit="login(); return false;">
                <div class="input-group">
                    <label for="email">Email:</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Digite seu email" id="email" required>
                   <div id="erroEmail" style="display:none; color:red; font-size: 13px;"></div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Digite sua senha" id="senha" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    <div id="erroSenha" style="display:none; color:red; font-size: 13px;"></div>
                </div>

                <input type="submit" value="Entrar">

                <div class="login-footer">
                    <a href="javascript:void(0)" onclick="recuperarSenha(); return false;">Esqueci a senha</a> |
                    <a href="../../paginadecadastro/cadastro.html">Cadastrar-se</a>
                </div>
                <div id="msgRecuperacao" style="display:none; color:#00ffb3; font-size: 13px; margin-top: 8px;"></div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
